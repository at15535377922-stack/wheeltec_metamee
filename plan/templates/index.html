<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演示流程管理器</title>
    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <style>
        .step-card {
            margin-bottom: 1rem;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
        }
        .step-card.running {
            background-color: #fff3cd;
        }
        .step-card.completed {
            background-color: #d4edda;
        }
        .step-card.failed {
            background-color: #f8d7da;
        }
        .btn-large {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            margin: 0.5rem;
        }
        .step-params {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background-color: #f8f9fa;
            border-radius: 0.25rem;
        }
	.container {
	    width: 100% !important;
            max-width: unset;
	}
	.text_status {
            width: 130px;
    	    display: inline-block;
    	    white-space: nowrap;
    	    overflow: hidden;
    	    text-overflow: ellipsis; 
            vertical-align: middle;
	}
	
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2>计划管理</h2>
        <div class="row mb-3">
            <div class="col">
                <div class="input-group">
                    <input type="text" id="planName" class="form-control" placeholder="计划名称">
                    <button class="btn btn-primary me-2" onclick="savePlan()">保存计划</button>
                    <button class="btn btn-danger me-2" onclick="showLoadPlanDialog()">加载计划</button>
                    <button class="btn btn-success me-2" onclick="runPlan()">运行计划</button>
                    <button id="pauseButton" class="btn btn-warning me-2" onclick="pausePlan()" style="display: none;">暂停计划</button>
                    <button id="resumeButton" class="btn btn-info me-2" onclick="resumePlan()" style="display: none;">继续计划</button>
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">步骤列表</h5>
                        <button class="btn btn-primary btn-sm" onclick="showStepModal()">添加步骤</button>
                    </div>
                    <div class="card-body">
                        <div id="stepList" class="list-group">
                            <!-- 步骤列表将在这里动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 步骤编辑对话框 -->
    <div class="modal fade" id="stepModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑步骤</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">步骤类型</label>
                        <select id="stepType" class="form-select" onchange="updateStepForm()">
                            <option value="navigation">导航</option>
                            <option value="speech">播报</option>
                            <option value="sleep">等待</option>
                        </select>
                    </div>

                    <div id="navigationParams" class="step-params">
                        <div class="mb-3">
                            <label class="form-label">导航点</label>
                            <select id="waypointName" class="form-select">
                                <!-- 导航点列表将在这里动态生成 -->
                            </select>
                        </div>
                    </div>

                    <div id="speechParams" class="step-params" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">播报内容</label>
                            <textarea id="speechText" class="form-control" rows="15"></textarea>
                        </div>
                    </div>

                    <div id="sleepParams" class="step-params" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">等待时间（秒）</label>
                            <input type="number" id="sleepDuration" class="form-control" min="0" step="0.1">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveStep()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载计划对话框 -->
    <div class="modal fade" id="loadPlanModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">加载计划</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="planList" class="list-group">
                        <!-- 计划列表将在这里动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/bootstrap.bundle.min.js"></script>
    <script>
        let currentSteps = [];
        let editingStepIndex = -1;
        const stepModal = new bootstrap.Modal(document.getElementById('stepModal'));
        const loadPlanModal = new bootstrap.Modal(document.getElementById('loadPlanModal'));
        let statusUpdateInterval = null;

        // 页面加载时清空计划名称
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('planName').value = '';
    updateControlButtons('stopped');
    startStatusUpdate(); // 开始状态更新
    console.log('Page loaded, starting status updates');
});

        const channel = new BroadcastChannel('plan-manager');

        // 标记是否本页面是第一个打开的
        let isFirst = true;

        // 监听来自其他页面的消息
        channel.onmessage = (event) => {
        if (event.data === 'page-opened') {
            // 收到别的页面的打开消息，说明已经有页面在打开
            isFirst = false;
            alert('该页面已在其他窗口/标签页打开，请勿重复打开！');
            // 可选：自动关闭本页
            window.close();
        }
        };

        // 页面加载时广播"我打开了"
        channel.postMessage('page-opened');

        // 定期更新状态
        async function updateStatus() {
            try {
        const response = await fetch('/api/status');
        const status = await response.json();
        console.log('Status update:', status);

        // 更新步骤状态
        if (status.current_plan && status.current_plan.length > 0) {
            const newSteps = status.current_plan;
            currentSteps.forEach((step, index) => {
                if (newSteps[index]) {
                    step.status = newSteps[index].status;
                    step.error = newSteps[index].error;
                }
            });
            renderSteps();
        }

        // 更新控制按钮状态
        if (status.is_running) {
            if (status.is_paused) {
                updateControlButtons('paused');
            } else {
                updateControlButtons('running');
            }
        } else {
            updateControlButtons('stopped');
        }

    } catch (error) {
        console.error('Error updating status:', error);
    }
}


        // 开始状态更新
        function startStatusUpdate() {
            if (statusUpdateInterval) {
                clearInterval(statusUpdateInterval);
            }
            statusUpdateInterval = setInterval(updateStatus, 1000); // 每秒更新一次
        }

        // 停止状态更新
        function stopStatusUpdate() {
            if (statusUpdateInterval) {
                clearInterval(statusUpdateInterval);
                statusUpdateInterval = null;
            }
        }

        // 渲染步骤列表
        function renderSteps() {
            const stepList = document.getElementById('stepList');
    stepList.innerHTML = '';

    currentSteps.forEach((step, index) => {
        const stepDiv = document.createElement('div');
        stepDiv.className = 'list-group-item';

        let stepContent = '';
        if (step.step_type === 'navigation') {
            stepContent = `导航到: ${step.params.waypoint_name}`;
        } else if (step.step_type === 'speech') {
            stepContent = `播报: ${step.params.text.substring(0, 20)}${step.params.text.length > 20 ? '...' : ''}`;
        } else if (step.step_type === 'sleep') {
            stepContent = `等待: ${step.params.duration}秒`;
        }

        stepDiv.innerHTML = `
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <span class="badge ${getStatusBadgeClass(step.status)} me-2">${step.status}</span>
	            <span class="text_status">${stepContent}</span>
                    ${step.error ? `<br><small class="text-danger">错误: ${step.error}</small>` : ''}
                </div>
                <div>
                    ${step.status === 'failed' || step.status === 'paused' ? `
                    <button class="btn btn-warning btn-sm me-2" onclick="resetStep(${index})">
                        重置状态
                    </button>
                    ` : ''}
                    <button class="btn btn-success btn-sm me-2" onclick="executeStep(${index})">
                        执行单步
                    </button>
                    <button class="btn btn-info btn-sm me-2" onclick="executeRemaining(${index})">
                        执行后续
                    </button>
                    <button class="btn btn-primary btn-sm me-2" onclick="editStep(${index})">
                        编辑
                    </button>
                    <button class="btn btn-danger btn-sm me-2" onclick="deleteStep(${index})">
                        删除
                    </button>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-secondary" onclick="moveStep(${index}, 'up')" ${index === 0 ? 'disabled' : ''}>
                            上移
                        </button>
                        <button class="btn btn-secondary" onclick="moveStep(${index}, 'down')" ${index === currentSteps.length - 1 ? 'disabled' : ''}>
                            下移
                        </button>
                    </div>
                </div>
            </div>
        `;
        stepList.appendChild(stepDiv);
    });
}

        // 执行单个步骤
        async function executeStep(index) {
            try {
                const step = currentSteps[index];
                if (!step) {
                    alert('步骤不存在');
                    return;
                }

                const hasRunning = currentSteps.some(s => s.status === 'running');
                if (hasRunning) {
                    if (!confirm('有步骤正在运行，确定要强制执行此步骤吗？')) {
                        return;
                    }
                }

                // 更新步骤状态为运行中
                step.status = 'running';
                renderSteps();

                // 发送执行请求
                const response = await fetch(`/api/plans/${document.getElementById('planName').value}/execute_step`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ step_index: index })
                });

                const result = await response.json();
                if (result.success) {
                    // 立即更新一次状态
                    updateStatus();
                } else {
                    step.status = 'failed';
                    step.error = result.error || '执行失败';
                    renderSteps();
                }
            } catch (error) {
                console.error('Error executing step:', error);
                alert('执行步骤失败: ' + error);
                currentSteps[index].status = 'failed';
                currentSteps[index].error = error.toString();
                renderSteps();
            }
        }
// 添加重置步骤状态的功能
async function resetStep(index) {
    const planName = document.getElementById('planName').value;
    if (!planName) {
        alert('请先输入计划名称');
        return;
    }

    try {
        const response = await fetch(`/api/plans/${planName}/reset_step/${index}`, {
            method: 'POST'
        });

        const result = await response.json();
        if (result.success) {
            currentSteps[index].status = 'pending';
            currentSteps[index].error = null;
            renderSteps();
            alert('步骤状态已重置');
        } else {
            alert('重置失败: ' + (result.error || '未知错误'));
        }
    } catch (error) {
        console.error('Error resetting step:', error);
        alert('重置失败: ' + error);
    }
}

        // 执行后续步骤
        async function executeRemaining(startIndex) {
            try {
                const planName = document.getElementById('planName').value;
                if (!planName) {
                    alert('请先保存计划');
                    return;
                }

                // 检查计划名称是否只包含英文字符和数字
                if (!/^[a-zA-Z0-9]+$/.test(planName)) {
                    alert('计划名称只能包含英文字符和数字');
                    return;
                }

                if (!confirm('确定要执行从当前步骤到最后的步骤吗？')) {
                    return;
                }

                // 发送执行请求
                const response = await fetch(`/api/plans/${planName}/run_remaining`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ start_index: startIndex })
                });

                const result = await response.json();
                if (result.success) {
                    alert(result.message || '开始执行后续步骤');
                    startStatusUpdate(); // 开始状态更新
                    updateControlButtons('running');
                } else {
                    alert(result.message || '执行失败');
                }
            } catch (error) {
                console.error('Error executing remaining steps:', error);
                alert('执行失败: ' + error);
            }
        }

        // 获取状态对应的样式类
        function getStatusBadgeClass(status) {
            switch (status) {
                case 'completed':
                    return 'bg-success';
                case 'running':
                    return 'bg-primary';
                case 'failed':
                    return 'bg-danger';
                case 'paused':  // 新增暂停状态
                    return 'bg-warning';
                default:
                    return 'bg-secondary';
                }
        }

        // 显示加载计划对话框
        async function showLoadPlanDialog() {
            try {
                const response = await fetch('/api/plans');
                const plans = await response.json();

                const planList = document.getElementById('planList');
                if (!planList) {
                    console.error('Plan list element not found');
                    return;
                }

                planList.innerHTML = '';

                if (plans.length === 0) {
                    planList.innerHTML = '<div class="list-group-item text-center">暂无保存的计划</div>';
                    return;
                }

                plans.forEach(plan => {
                    const row = document.createElement('div');
                    row.className = 'list-group-item d-flex justify-content-between align-items-center';
                    row.innerHTML = `
                        <span>${plan}</span>
                        <div>
                            <button class="btn btn-primary btn-sm me-2" onclick="selectPlan('${plan}')">选择</button>
                            <button class="btn btn-danger btn-sm" onclick="deletePlan('${plan}')">删除</button>
                        </div>
                    `;
                    planList.appendChild(row);
                });

                loadPlanModal.show();
            } catch (error) {
                console.error('Error loading plans:', error);
                alert('加载计划列表失败: ' + error);
            }
        }

        // 选择计划
        async function selectPlan(planName) {
            try {
                const response = await fetch(`/api/plans/${planName}`);
                if (!response.ok) {
                    throw new Error('计划不存在');
                }
                const steps = await response.json();
                currentSteps = steps;
                renderSteps();
                document.getElementById('planName').value = planName;
                loadPlanModal.hide();
                // 立即更新一次状态
                updateStatus();
                startStatusUpdate(); // 开始状态更新
            } catch (error) {
                console.error('Error loading plan:', error);
                alert('加载计划失败: ' + error);
            }
        }

        // 删除计划
        async function deletePlan(planName) {
            if (confirm(`确定要删除计划 "${planName}" 吗？`)) {
                try {
                    const response = await fetch(`/api/plans/${planName}`, {
                        method: 'DELETE'
                    });
                    const result = await response.json();

                    if (result.success) {
                        // 如果删除的是当前加载的计划，清空当前计划
                        if (document.getElementById('planName').value === planName) {
                            currentSteps = [];
                            renderSteps();
                            document.getElementById('planName').value = '';
                            updateControlButtons('stopped');
                        }
                        // 重新加载计划列表
                        showLoadPlanDialog();
                    } else {
                        alert('删除失败: ' + (result.error || '未知错误'));
                    }
                } catch (error) {
                    console.error('Error deleting plan:', error);
                    alert('删除失败: ' + error);
                }
            }
        }

        // 显示步骤编辑对话框
        function showStepModal() {
            editingStepIndex = -1;
            document.getElementById('stepType').value = 'navigation';
            updateStepForm();
            stepModal.show();
        }

        // 更新步骤表单
        async function updateStepForm() {
            const stepType = document.getElementById('stepType').value;

            // 隐藏所有参数区域
            document.getElementById('navigationParams').style.display = 'none';
            document.getElementById('speechParams').style.display = 'none';
            document.getElementById('sleepParams').style.display = 'none';

            // 显示对应类型的参数区域
            document.getElementById(stepType + 'Params').style.display = 'block';

            // 如果是导航类型，加载导航点列表
            if (stepType === 'navigation') {
                try{
                    const response = await fetch('/api/waypoints');
                    const waypoints = await response.json();

                    const waypointSelect = document.getElementById('waypointName');
                    waypointSelect.innerHTML = waypoints.map(wp =>
                        `<option value="${wp}">${wp}</option>`
                    ).join('');
                } catch (error) {
                    console.error('Error loading waypoints:', error);
                    alert('加载导航点列表失败: ' + error);
                }
            }
        }

        // 保存步骤
        function saveStep() {
            const stepType = document.getElementById('stepType').value;
            let step = {
                step_type: stepType,
                name: stepType,
                params: {}
            };

            switch (stepType) {
                case 'navigation':
                    step.params.waypoint_name = document.getElementById('waypointName').value;
                    break;
                case 'speech':
                    step.params.text = document.getElementById('speechText').value;
                    break;
                case 'sleep':
                    step.params.duration = document.getElementById('sleepDuration').value;
                    break;
            }

            if (editingStepIndex === -1) {
                currentSteps.push(step);
            } else {
                currentSteps[editingStepIndex] = step;
            }

            renderSteps();
            stepModal.hide();
        }

        // 编辑步骤
        function editStep(index) {
            editingStepIndex = index;
            const step = currentSteps[index];

            document.getElementById('stepType').value = step.step_type;
            updateStepForm();

            switch (step.step_type) {
                case 'navigation':
                    document.getElementById('waypointName').value = step.params.waypoint_name;
                    break;
                case 'speech':
                    document.getElementById('speechText').value = step.params.text;
                    break;
                case 'sleep':
                    document.getElementById('sleepDuration').value = step.params.duration;
                    break;
            }

            stepModal.show();
        }

        // 删除步骤
        function deleteStep(index) {
            if (confirm('确定要删除这个步骤吗？')) {
                currentSteps.splice(index, 1);
                renderSteps();
            }
        }

        // 保存计划
        async function savePlan() {
            const planName = document.getElementById('planName').value;
            if (!planName) {
                alert('请输入计划名称');
                return;
            }

            // 检查计划名称是否只包含英文字符和数字
            if (!/^[a-zA-Z0-9]+$/.test(planName)) {
                alert('计划名称只能包含英文字符和数字');
                return;
            }

            try {
                const response = await fetch(`/api/plans/${planName}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(currentSteps)
                });

                const result = await response.json();
                if (result.success) {
                    alert('保存成功');
                } else {
                    alert('保存失败: ' + (result.error || '未知错误'));
                }
            } catch (error) {
                console.error('Error saving plan:', error);
                alert('保存失败: ' + error);
            }
        }

        // 运行计划
        async function runPlan() {
    const planName = document.getElementById('planName').value;
    if (!planName) {
        alert('请输入计划名称');
        return;
    }

    try {
        // 获取当前状态
        const statusResponse = await fetch('/api/status');
        const status = await statusResponse.json();

        // 如果计划在暂停状态，直接恢复
        if (status.is_running && status.is_paused) {
            const resumeResponse = await fetch(`/api/plans/${planName}/resume`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const result = await resumeResponse.json();
            if (result.success) {
                alert(result.message || '计划已继续执行');
                updateControlButtons('running');
                startStatusUpdate();
            } else {
                alert(result.message || '继续执行失败');
            }
            return;
        }

        // 如果计划完全停止，重新运行
        if (!status.is_running) {
            let startIndex = 0;
            if (status.current_plan && status.current_plan.length > 0) {
                const failedIndex = status.current_plan.findIndex(step =>
                    step.status === 'failed' || step.status === 'paused'
                );
                if (failedIndex !== -1) {
                    startIndex = failedIndex;
                }
            }

            if (!confirm(`确定要从步骤 ${startIndex + 1} 开始运行计划吗？`)) return;

            const runResponse = await fetch(`/api/plans/${planName}/run`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ start_index: startIndex })
            });
            const result = await runResponse.json();
            if (result.success) {
                alert(result.message || '计划运行开始');
                updateControlButtons('running');
                startStatusUpdate();
            } else {
                alert(result.message || '运行失败');
            }
        }
    } catch (error) {
        alert('运行失败: ' + error);
    }
}

        // 暂停计划
        async function pausePlan() {
    const planName = document.getElementById('planName').value;
    if (!planName) {
        alert('请先输入计划名称');
        return;
    }

    try {
        const response = await fetch(`/api/plans/${planName}/pause`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        const result = await response.json();
        if (result.success) {
            alert(result.message || '计划已暂停');
            updateControlButtons('paused'); // 立即切换按钮
        } else {
            alert(result.message || '暂停失败');
        }
    } catch (error) {
        alert('暂停计划失败: ' + error.message);
    }
}

        // 继续计划
        async function resumePlan() {
    const planName = document.getElementById('planName').value;
    if (!planName) {
        alert('请先输入计划名称');
        return;
    }

    try {
        const response = await fetch(`/api/plans/${planName}/resume`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        const result = await response.json();
        if (result.success) {
            alert(result.message || '计划已继续');
            updateControlButtons('running'); // 立即切换按钮
        } else {
            alert(result.message || '继续失败');
        }
    } catch (error) {
        alert('继续计划失败: ' + error.message);
    }
}

        // 根据计划状态更新控制按钮的显示
        function updateControlButtons(status) {
            const runButton = document.querySelector('button[onclick="runPlan()"]');
    const pauseButton = document.getElementById('pauseButton');
    const resumeButton = document.getElementById('resumeButton');

    console.log('Updating control buttons to:', status);

    switch (status) {
        case 'running':
            runButton.style.display = 'none';
            pauseButton.style.display = 'inline-block';
            resumeButton.style.display = 'none';
            pauseButton.textContent = '暂停计划';
            break;
        case 'paused':
            runButton.style.display = 'none';
            pauseButton.style.display = 'none';
            resumeButton.style.display = 'inline-block';
            resumeButton.textContent = '继续计划';
            break;
        case 'stopped':
        default:
            runButton.style.display = 'inline-block';
            pauseButton.style.display = 'none';
            resumeButton.style.display = 'none';
            runButton.textContent = '运行计划';
            break;
    }
}

        // 移动步骤
        function moveStep(index, direction) {
            if (direction === 'up' && index > 0) {
                // 向上移动
                const temp = currentSteps[index];
                currentSteps[index] = currentSteps[index - 1];
                currentSteps[index - 1] = temp;
            } else if (direction === 'down' && index < currentSteps.length - 1) {
                // 向下移动
                const temp = currentSteps[index];
                currentSteps[index] = currentSteps[index + 1];
                currentSteps[index + 1] = temp;
            }
            renderSteps();
        }

        // 页面卸载时停止状态更新
        window.addEventListener('beforeunload', function() {
            stopStatusUpdate();
        });
    </script>
</body>
